<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4742F"/>
      <stop offset="40%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="deltaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Clip: only show football inside the delta's inner triangle (the hole) -->
    <clipPath id="deltaHole">
      <path d="M100,72 L60,148 L140,148 Z"/>
    </clipPath>
    <clipPath id="exitTopLeft">
      <!-- Area below the delta's inner bottom edge only (bottom-left exit) -->
      <polygon points="0,148 60,148 0,200"/>
    </clipPath>
    <clipPath id="exitBottomRight">
      <!-- Area below and to the right of the delta's inner triangle -->
      <polygon points="200,0 100,72 140,148 200,200 200,0"/>
    </clipPath>
  </defs>

  <!-- Full delta drawn as one solid piece (back layer) -->
  <g filter="url(#shadow)">
    <!-- Outer triangle -->
    <path d="M100,25 L40,160 L160,160 Z" fill="url(#deltaGrad)"/>
    <!-- Inner cutout (matches background) -->
    <path d="M100,72 L60,148 L140,148 Z" fill="#1a1d24"/>
  </g>

  <!-- Football - clipped to only show through the delta's hole -->
  <g clip-path="url(#deltaHole)">
    <g transform="translate(100, 112) rotate(-35)" filter="url(#shadow)">
      <ellipse cx="0" cy="0" rx="50" ry="30" fill="url(#ball)" stroke="#5C2D06" stroke-width="1.5"/>
      <ellipse cx="-10" cy="-10" rx="32" ry="15" fill="#C4742F" opacity="0.4"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="-6" x2="-10" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-3" y1="-7" x2="-3" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4" y1="-7" x2="4" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="11" y1="-6" x2="11" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-46,-8 Q-26,-28 0,-30 Q26,-28 46,-8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
      <path d="M-46,8 Q-26,28 0,30 Q26,28 46,8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Football poking out bottom-left (in front of delta) -->
  <g clip-path="url(#exitTopLeft)">
    <g transform="translate(100, 112) rotate(-35)">
      <ellipse cx="0" cy="0" rx="50" ry="30" fill="url(#ball)" stroke="#5C2D06" stroke-width="1.5"/>
      <ellipse cx="-10" cy="-10" rx="32" ry="15" fill="#C4742F" opacity="0.4"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="-6" x2="-10" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-3" y1="-7" x2="-3" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4" y1="-7" x2="4" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="11" y1="-6" x2="11" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-46,-8 Q-26,-28 0,-30 Q26,-28 46,-8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
      <path d="M-46,8 Q-26,28 0,30 Q26,28 46,8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Football poking out bottom-right (in front of delta) -->
  <g clip-path="url(#exitBottomRight)">
    <g transform="translate(100, 112) rotate(-35)">
      <ellipse cx="0" cy="0" rx="50" ry="30" fill="url(#ball)" stroke="#5C2D06" stroke-width="1.5"/>
      <ellipse cx="-10" cy="-10" rx="32" ry="15" fill="#C4742F" opacity="0.4"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="-6" x2="-10" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-3" y1="-7" x2="-3" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4" y1="-7" x2="4" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="11" y1="-6" x2="11" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M-46,-8 Q-26,-28 0,-30 Q26,-28 46,-8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
      <path d="M-46,8 Q-26,28 0,30 Q26,28 46,8" fill="none" stroke="#5C2D06" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Motion lines -->
  <g opacity="0.3" stroke="#60a5fa" stroke-width="2" stroke-linecap="round">
    <line x1="155" y1="78" x2="175" y2="65"/>
    <line x1="158" y1="88" x2="182" y2="79"/>
    <line x1="156" y1="98" x2="178" y2="93"/>
  </g>
</svg>
